server:
  port: 10004

spring:
  application:
    name: digital-employee-backend
  
  datasource:
    url: jdbc:mysql://localhost:3306/digital_employee?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  
  sql:
    init:
      mode: never

file:
  upload:
    path: ./uploads
    allowed-extensions: jpg,jpeg,png,gif,webp
